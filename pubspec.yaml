name: ceres_mpc
description: "Ceres MPC SDK — two-party ECDSA keygen, recovery, signing"
version: 0.1.0
homepage: https://github.com/SauceWu/ceres-mpc
repository: https://github.com/SauceWu/ceres-mpc
issue_tracker: https://github.com/SauceWu/ceres-mpc/issues

environment:
  sdk: ^3.8.1
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_rust_bridge: 2.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter
  mocktail: ^1.0.0

